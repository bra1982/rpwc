<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ranking Dinâmico da Copa do Mundo FIFA</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --card2:#f8fafc;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e6ebf2;
      --blue:#1d4ed8;
      --green:#16a34a;
      --red:#dc2626;
      --gold:#b08d57;
      --shadow:0 18px 60px rgba(15,23,42,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(29,78,216,.06), transparent 28%),
        radial-gradient(circle at top right, rgba(176,141,87,.08), transparent 25%),
        var(--bg);
      color:var(--text);
      overflow:hidden;
    }
    .app{
      height:100vh;
      display:flex;
      flex-direction:column;
      padding:16px;
      gap:12px;
    }
    .header{
      display:flex;
      justify-content:center;
      align-items:center;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px 18px;
    }
    .header-main{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      min-width:0;
    }
    .year{
      font-size:26px;
      font-weight:900;
      letter-spacing:-.04em;
      text-align:center;
      color:var(--text);
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      flex:1 1 320px;
      min-width:0;
      flex-wrap:wrap;
    }
    .flag{
      width:28px;
      height:auto;
      border-radius:3px;
      box-shadow:0 0 0 1px rgba(0,0,0,.08);
      vertical-align:middle;
    }
    .controls{
      display:flex;
      gap:12px;
      align-items:center;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:12px 14px;
      flex-wrap:wrap;
    }
    .controls input[type="range"]{
      flex:1;
      min-width:240px;
      accent-color:var(--blue);
    }
    .controls button{
      border:none;
      cursor:pointer;
      background:linear-gradient(135deg, #e8f0ff, #f5efe3);
      color:var(--text);
      padding:10px 14px;
      font-weight:800;
      border-radius:12px;
      border:1px solid var(--line);
    }
    .table-wrap{
      flex:1;
      min-height:0;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .table-head{
      display:grid;
      grid-template-columns:60px 1.55fr 1fr 72px 72px 86px;
      gap:10px;
      padding:10px 16px;
      background:var(--card2);
      color:#334155;
      font-size:12px;
      font-weight:800;
      border-bottom:1px solid var(--line);
    }
    .rows{overflow:auto;flex:1}
    .row{
      display:grid;
      grid-template-columns:60px 1.55fr 1fr 72px 72px 86px;
      gap:10px;
      padding:8px 10px;
      border-bottom:1px solid var(--line);
      align-items:center;
      font-size:16px;
      line-height:1.12;
      transition:transform .55s cubic-bezier(.2,.9,.2,1), background .25s ease, opacity .55s ease, box-shadow .55s ease, filter .55s ease;
      will-change:transform;
    }
    .row:hover{background:#fafcff}
    .row.moving-up{box-shadow:0 10px 22px rgba(22,163,74,.16);filter: drop-shadow(0 6px 10px rgba(22,163,74,.14))}
    .row.moving-down{box-shadow:0 10px 22px rgba(220,38,38,.16);filter: drop-shadow(0 6px 10px rgba(220,38,38,.14))}
    .pos{font-weight:900;color:var(--gold);font-size:15px}
    .name{font-weight:500}
    .country,.games,.change{color:var(--muted)}
    .up{color:var(--green);font-weight:800}
    .down{color:var(--red);font-weight:800}
    .same{color:#64748b;font-weight:800}
    .new{color:var(--blue);font-weight:800}

    .podium {
      display: flex;
      gap: 12px;
      margin-left: 20px;
      padding-left: 20px;
      border-left: 2px solid var(--line);
      align-items: center;
    }
    .podium-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      background: var(--card2);
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
    }
    .podium-flag {
      width: 22px;
      height: auto;
      border-radius: 2px;
    }
    .podium-initials {
      font-size: 9px;
      font-weight: 900;
      color: var(--muted);
      margin-top: 2px;
      text-transform: uppercase;
    }
    .medal {
      position: absolute;
      top: -10px;
      font-size: 12px;
    }

    .legend{
      position:static;
      display:flex;
      flex-direction:column;
      gap:4px;
      font-size:10px;
      color:var(--muted);
      line-height:1.2;
      text-align:left;
      border-left:1px solid var(--line);
      padding-left:15px;
      flex:0 0 auto;
      max-width:100%;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:5px;
      white-space:nowrap;
    }

    .legend-icon{
      font-weight:900;
      width:12px;
      display:inline-block;
    }

    @media (max-width: 920px){
      .table-head,.row{grid-template-columns:52px 1.45fr 1fr 64px 64px 78px}
    }

    @media (max-width: 720px){
      .app{padding:8px;gap:8px}
      .header{padding:10px 12px}
      .controls{gap:8px;padding:8px 10px}
      .controls input[type=range]{min-width:120px}
      .table-head,.row{grid-template-columns:42px 1.75fr .9fr 54px 58px;gap:4px;padding:5px 6px;font-size:12px}
      .games,.head-games{display:none}
      .table-head{font-size:10px}
      .pos{font-size:12px}
      .name{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .country{font-size:11px;white-space:nowrap}
      .change{font-size:11px;white-space:nowrap}
      .year{font-size:20px;gap:6px}
      .flag{width:22px}
      .legend{display:none}
      .podium{margin-left:10px;padding-left:10px;gap:8px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="year" id="yearTitle">1930 - Copa do Mundo (Uruguai)</div>
      <div class="legend">
        <div class="legend-item"><span class="legend-icon" style="color:var(--green)">▲</span> Subiu no ranking</div>
        <div class="legend-item"><span class="legend-icon" style="color:var(--red)">▼</span> Desceu no ranking</div>
        <div class="legend-item"><span class="legend-icon" style="color:var(--blue)">✨</span> Estreia no ranking</div>
      </div>
    </div>

    <div class="controls">
      <div style="font-weight:800;color:#334155" id="yearLabel">1930</div>
      <input type="range" id="yearSlider" min="0" max="0" value="0" />
      <button id="playBtn">▶ Play</button>
    </div>

    <div class="table-wrap">
      <div class="table-head">
        <div>Pos.</div>

        <div>Gols</div>

        <div>Variação</div>
      </div>
      <div class="rows" id="rows"></div>
    </div>
  </div>

    function flagImg(country, size=20){

    let currentIdx = 0;
    let timer = null;
    let isPlaying = false;
    const mobileQuery = window.matchMedia('(max-width: 720px)');

    function isMobile(){ return mobileQuery.matches; }

    function abbreviateCountry(country){
      if(!country) return '';
      const clean = String(country).replace(/[^A-Za-zÀ-ÿ\s-]/g,' ').replace(/\s+/g,' ').trim();
      if(!clean) return '';
      const parts = clean.split(' ').filter(Boolean);
      return parts.map(p => p[0]).join('').slice(0,2).toUpperCase();
    }

    function abbreviatePlayer(name){
      if(!name) return '';
      const clean = String(name).replace(/\s+/g,' ').trim();
      if(!clean) return '';
      const parts = clean.split(' ').filter(Boolean);
      const first = parts[0];
      const last = parts.length > 1 ? parts[parts.length - 1] : '';
      if(!last) return first;
      return `${first} ${last[0].toUpperCase()}.`;
    }

    function getDisplayName(name){ return isMobile() ? abbreviatePlayer(name) : name; }
    function getDisplayCountry(country){ return isMobile() ? abbreviateCountry(country) : country; }

    function cumulativeUntil(year){
      const totals = new Map();
      for(const ed of editions){
        if(ed.year > year) break;
        for(const u of ed.updates){
          const prev = totals.get(u.name) || { name:u.name, country:u.country, goals:0, games:0 };
          totals.set(u.name, { name:u.name, country:u.country, goals:prev.goals + u.goals, games:prev.games + u.games });
        }
      }
      return [...totals.values()]
        .sort((a,b)=>b.goals-a.goals || a.games-b.games || a.name.localeCompare(b.name))
        .slice(0,20);
    }

    function render(i){
      currentIdx = i;
      slider.value = i;

      const year = years[i];
      const current = cumulativeUntil(year);
      const previous = i > 0 ? cumulativeUntil(years[i-1]) : [];
      const prevPos = new Map(previous.map((p, idx) => [p.name, idx+1]));
      const oldBoxes = new Map([...rows.querySelectorAll('.row')].map(el => [el.dataset.name, el.getBoundingClientRect()]));

      const hostName = hostMap[year] || 'Sede';
      const hostFlag = hostFlagMap[hostName] || 'un';
      const winners = worldCupWinners[year] || [];
      const podiumHtml = winners.length ? `
        <div class="podium">
          ${winners.map((w, idx) => `
            <div class="podium-item">
              <span class="medal">${idx === 0 ? '🥇' : idx === 1 ? '🥈' : '🥉'}</span>
              <img src="https://flagcdn.com/w40/${w.f}.png" class="podium-flag" alt="${w.n}">
              <span class="podium-initials">${w.n.substring(0, 3)}</span>
            </div>
          `).join('')}
        </div>
      ` : '';

      yearTitle.innerHTML = `
        <div style="display:flex;align-items:center;flex-wrap:wrap;justify-content:center;gap:10px">
          <span>${year} - Copa do Mundo ${hostName}</span>
          <img src="https://flagcdn.com/w80/${hostFlag}.png" style="height:40px;width:auto;border-radius:4px;box-shadow:0 4px 10px rgba(0,0,0,0.15)">
          ${podiumHtml}
        </div>
      `;

      yearLabel.textContent = year;

      rows.innerHTML = current.map((p, idx) => {
        const old = prevPos.get(p.name);
        let change = 0;
        let cls = 'same';
        let motionClass = '';

        if(old === undefined){
          change = '';
          cls = 'new';
        } else if(old > idx + 1){
          change = old - (idx + 1);
          cls = 'up';
          motionClass = 'moving-up';
        } else if(old < idx + 1){
          change = (idx + 1) - old;
          cls = 'down';
          motionClass = 'moving-down';
        }

        const displayName = getDisplayName(p.name);
        const displayCountry = getDisplayCountry(p.country);

        return `
          <div class="row ${motionClass}" data-name="${p.name}">
            <div class="pos">${idx + 1}</div>
            <div class="name" title="${p.name}">${activePlayers.includes(p.name) ? `<strong>${displayName}</strong>` : displayName}</div>
            <div class="country" title="${p.country}">${flagImg(p.country)}${displayCountry}</div>
            <div class="gols">${p.goals}</div>
            <div class="games">${isMobile() ? '' : (p.games ?? '')}</div>
            <div class="${cls}">${change}</div>
          </div>
        `;
      }).join('');

      const nextEls = [...rows.querySelectorAll('.row')];
      nextEls.forEach(el => {
        const oldBox = oldBoxes.get(el.dataset.name);
        if(!oldBox){
          el.animate([{opacity:0, transform:'translateY(8px)'},{opacity:1, transform:'translateY(0)'}], {duration:420, easing:'ease-out'});
          return;
        }
        const newBox = el.getBoundingClientRect();
        const dx = oldBox.left - newBox.left;
        const dy = oldBox.top - newBox.top;
        el.style.transform = `translate(${dx}px, ${dy}px)`;
        el.style.transition = 'none';
        requestAnimationFrame(() => {
          el.style.transition = 'transform 620ms cubic-bezier(.2,.9,.2,1), opacity 620ms ease';
          el.style.transform = 'translate(0,0)';
        });
      });
    }

    mobileQuery.addEventListener?.('change', () => render(currentIdx));
    window.addEventListener('resize', () => render(currentIdx));

    slider.addEventListener('input', e => render(parseInt(e.target.value, 10)));
    render(0);
  </script>
</body>
</html>
