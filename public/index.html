<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ranking Dinâmico da Copa do Mundo FIFA</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --card2:#f8fafc;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e6ebf2;
      --blue:#1d4ed8;
      --green:#16a34a;
      --red:#dc2626;
      --gold:#b08d57;
      --shadow:0 18px 60px rgba(15,23,42,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(29,78,216,.06), transparent 28%),
        radial-gradient(circle at top right, rgba(176,141,87,.08), transparent 25%),
        var(--bg);
      color:var(--text);
      overflow:hidden;
    }
    .app{
      height:100vh;
      display:flex;
      flex-direction:column;
      padding:16px;
      gap:12px;
    }
	.header{
	  display:flex;
	  justify-content:center;
	  align-items:center;
	  background:var(--card);
	  border:1px solid var(--line);
	  border-radius:var(--radius);
	  box-shadow:var(--shadow);
	  padding:14px 18px;
	}
	.header-main{
	  width:100%;
	  display:flex;
	  align-items:center;
	  justify-content:space-between;
	  gap:16px;
	  flex-wrap:wrap;
	  min-width:0;
	}
	.year{
	  font-size:26px;
	  font-weight:900;
	  letter-spacing:-.04em;
	  text-align:center;
	  color:var(--text);
	  display:flex;
	  gap:10px;
	  align-items:center;
	  justify-content:center;
	  flex:1 1 320px;
	  min-width:0;
	  flex-wrap:wrap;
	}
	.flag{
      width:28px;
      height:auto;
      border-radius:3px;
      box-shadow:0 0 0 1px rgba(0,0,0,.08);
      vertical-align:middle;
    }
    .controls{
      display:flex;
      gap:12px;
      align-items:center;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:12px 14px;
      flex-wrap:wrap;
    }
    .controls input[type="range"]{
      flex:1;
      min-width:240px;
      accent-color:var(--blue);
    }
    .controls button{
      border:none;
      cursor:pointer;
      background:linear-gradient(135deg, #e8f0ff, #f5efe3);
      color:var(--text);
      padding:10px 14px;
      font-weight:800;
      border-radius:12px;
      border:1px solid var(--line);
    }
    .table-wrap{
      flex:1;
      min-height:0;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .table-head{
      display:grid;
      grid-template-columns:60px 1.55fr 1fr 72px 72px 86px;
      gap:10px;
      padding:10px 16px;
      background:var(--card2);
      color:#334155;
      font-size:12px;
      font-weight:800;
      border-bottom:1px solid var(--line);
    }
    .rows{overflow:auto;flex:1}
    .row{
      display:grid;
      grid-template-columns:60px 1.55fr 1fr 72px 72px 86px;
      gap:10px;
      padding:8px 10px;
      border-bottom:1px solid var(--line);
      align-items:center;
      font-size:16px;
      line-height:1.12;
      transition:transform .55s cubic-bezier(.2,.9,.2,1), background .25s ease, opacity .55s ease, box-shadow .55s ease, filter .55s ease;
      will-change:transform;
    }
    .row:hover{background:#fafcff}
    .row.moving-up{box-shadow:0 10px 22px rgba(22,163,74,.16);filter: drop-shadow(0 6px 10px rgba(22,163,74,.14))}
    .row.moving-down{box-shadow:0 10px 22px rgba(220,38,38,.16);filter: drop-shadow(0 6px 10px rgba(220,38,38,.14))}
    .pos{font-weight:900;color:var(--gold);font-size:15px}
    .name{font-weight:500}
    .country,.games,.change{color:var(--muted)}
    .up{color:var(--green);font-weight:800}
    .down{color:var(--red);font-weight:800}
    .same{color:#64748b;font-weight:800}
    .new{color:var(--blue);font-weight:800}
    @media (max-width: 920px){
      .table-head,.row{grid-template-columns:52px 1.45fr 1fr 64px 64px 78px}
    }
    @media (max-width: 720px){
      .games{display:none}
      .table-head,.row{grid-template-columns:52px 1.55fr 1fr 64px 78px}
    }

    .podium {
      display: flex;
      gap: 12px;
      margin-left: 20px;
      padding-left: 20px;
      border-left: 2px solid var(--line);
      align-items: center;
    }
    .podium-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      background: var(--card2);
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
    }
    .podium-flag {
      width: 22px;
      height: auto;
      border-radius: 2px;
    }
    .podium-initials {
      font-size: 9px;
      font-weight: 900;
      color: var(--muted);
      margin-top: 2px;
      text-transform: uppercase;
    }
    .medal {
      position: absolute;
      top: -10px;
      font-size: 12px;
    }
	
	.legend{
	  position:static;
	  display:flex;
	  flex-direction:column;
	  gap:4px;
	  font-size:10px;
	  color:var(--muted);
	  line-height:1.2;
	  text-align:left;
	  border-left:1px solid var(--line);
	  padding-left:15px;
	  flex:0 0 auto;
	  max-width:100%;
	}

	.legend-item{
	  display:flex;
	  align-items:center;
	  gap:5px;
	  white-space:nowrap;
	}

	.legend-icon{
	  font-weight:900;
	  width:12px;
	  display:inline-block;
	}

  </style>
</head>

            <div class="podium-item">
              <span class="medal">${idx === 0 ? '🥇' : idx === 1 ? '🥈' : '🥉'}</span>
              <img src="https://flagcdn.com/w40/${w.f}.png" class="podium-flag" alt="${w.n}">
              <span class="podium-initials">${w.n.substring(0, 3)}</span>
            </div>
          `).join('')}
        </div>
      `;

      yearTitle.innerHTML = `
        <div style="display:flex; align-items:center; flex-wrap:wrap; justify-content:center;">
          <span>${year} - Copa do Mundo (${hostName})</span>
          <img src="https://flagcdn.com/w80/${hostFlag}.png" style="height:40px; margin-left:15px; border-radius:4px; box-shadow: 0 4px 10px rgba(0,0,0,0.15)">
          ${podiumHtml}
        </div>
      `;


      yearLabel.textContent = year;

      rows.innerHTML = current.map((p, idx) => {
        const old = prevPos.get(p.name);
        let change = '—', cls = 'same', motionClass = '';
        if(old === undefined){ change = '✨'; cls = 'new'; }
        else if(old > idx + 1){ change = `▲ ${old - (idx + 1)}`; cls = 'up'; motionClass = 'moving-up'; }
        else if(old < idx + 1){ change = `▼ ${(idx + 1) - old}`; cls = 'down'; motionClass = 'moving-down'; }
        return `
          <div class="row ${motionClass}" data-name="${p.name}">
            <div class="pos">${idx + 1}</div>
            <div class="name" style="${activePlayers.includes(p.name) ? 'font-weight:900' : 'font-weight:400'}">${p.name}</div>
            <div class="country">${flagImg(p.country)} ${p.country}</div>
            <div class="games">${p.goals}</div>
            <div class="games">${p.games || ''}</div>
            <div class="${cls}">${change}</div>
          </div>
        `;
      }).join('');

      const nextEls = [...rows.querySelectorAll('.row')];
      nextEls.forEach(el => {
        const oldBox = oldBoxes.get(el.dataset.name);
        if(!oldBox){
          el.animate([{ opacity:0, transform:'translateY(8px)' }, { opacity:1, transform:'translateY(0)' }], { duration:420, easing:'ease-out' });
          return;
        }
        const newBox = el.getBoundingClientRect();
        const dx = oldBox.left - newBox.left;
        const dy = oldBox.top - newBox.top;
        el.style.transform = `translate(${dx}px, ${dy}px)`;
        el.style.transition = 'none';
      });
      requestAnimationFrame(() => {
        nextEls.forEach(el => {
          el.style.transition = 'transform 620ms cubic-bezier(.2,.9,.2,1), opacity 620ms ease';
          el.style.transform = 'translate(0,0)';
        });
      });
    }

    function togglePlay(){
      if(isPlaying){
        clearInterval(timer);
        isPlaying = false;
        playBtn.textContent = '▶ Play';
      } else {
        if(currentIdx >= years.length - 1) currentIdx = -1;
        isPlaying = true;
        playBtn.textContent = 'Pause';
        timer = setInterval(() => {
          if(currentIdx < years.length - 1){
            render(currentIdx + 1);
          } else {
            togglePlay();
          }
        }, 2000);
      }
    }

    slider.addEventListener('input', e => {
      if(isPlaying) togglePlay();
      render(parseInt(e.target.value, 10));
    });

    playBtn.addEventListener('click', togglePlay);

    render(0);

   </script>
</body>
</html>
